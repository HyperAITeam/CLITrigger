name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.16) — used only for manual runs'
        required: false

permissions:
  contents: write

jobs:
  npm-release:
    name: npm + tarball
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install server dependencies
        run: npm ci

      - name: Install client dependencies
        run: cd src/client && npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Package release artifact
        run: |
          tar -czf clitrigger-${{ github.ref_name }}.tar.gz \
            dist/ \
            package.json \
            package-lock.json \
            .env.example \
            LICENSE \
            docs/

      - name: Locate release notes
        run: |
          if [ -f "docs/release-notes/${{ github.ref_name }}.md" ]; then
            cp "docs/release-notes/${{ github.ref_name }}.md" /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: clitrigger-${{ github.ref_name }}.tar.gz

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  desktop:
    name: Desktop (${{ matrix.os }})
    needs: npm-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            artifact_glob: |
              release/*.exe
              release/*.blockmap
              release/latest.yml
          - os: macos-latest
            artifact_glob: |
              release/*.dmg
              release/*.zip
              release/*.blockmap
              release/latest-mac.yml
          - os: ubuntu-latest
            artifact_glob: |
              release/*.AppImage
              release/latest-linux.yml
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install server dependencies
        run: npm ci

      - name: Install client dependencies
        run: cd src/client && npm ci

      - name: Build project
        run: npm run build

      - name: Rebuild native modules for Electron
        run: npm run electron:rebuild

      - name: Build & publish Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --publish always

      - name: Upload artifacts (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: ignore
          retention-days: 14
