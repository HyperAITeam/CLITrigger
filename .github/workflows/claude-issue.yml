name: Claude Code - Issue Worker

on:
  issues:
    types: [labeled]

jobs:
  claude-work:
    if: github.event.label.name == 'claude-fix'
    runs-on: self-hosted
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          cd src/client && npm ci

      - name: Run Claude Code
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          BRANCH_NAME="claude/issue-${ISSUE_NUMBER}"

          git checkout -b "$BRANCH_NAME"

          claude --print --dangerously-skip-permissions <<'PROMPT'
          You are working on CLITrigger — a Node.js monorepo (server + React client) that orchestrates CLI AI tools (Claude, Gemini, Codex).

          ## Project structure
          - Server: src/server/ (Express + better-sqlite3 + WebSocket)
          - Client: src/client/ (React + Vite + TypeScript)
          - Tests: vitest for both server and client
          - Key services: orchestrator, scheduler, claude-manager, tunnel-manager

          ## Your task
          Implement the changes requested in this GitHub issue:

          **Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}**

          ${{ github.event.issue.body }}

          ## Rules
          1. Implement the changes described in the issue
          2. If adding i18n strings, add both Korean (ko) and English (en) translations in src/client/src/i18n.tsx
          3. Run `npm run typecheck` to verify no type errors
          4. Run `npm test` to verify all tests pass
          5. Commit your changes with a descriptive message
          PROMPT

      - name: Push and create PR
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          BRANCH_NAME="claude/issue-${ISSUE_NUMBER}"

          # Check if there are any changes to commit
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes were made by Claude"
            gh issue comment "$ISSUE_NUMBER" --body "Claude Code가 이 이슈에 대해 코드 변경을 생성하지 못했습니다. 이슈 설명을 더 구체적으로 작성해주세요."
            exit 0
          fi

          # Stage and commit any uncommitted changes
          git add -A
          git diff --cached --quiet || git commit -m "feat: implement issue #${ISSUE_NUMBER} - ${ISSUE_TITLE}"

          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}" \
            --body "$(cat <<EOF
          ## Summary
          Automated implementation for #${ISSUE_NUMBER}

          Closes #${ISSUE_NUMBER}

          ---
          Generated by Claude Code (self-hosted runner)
          EOF
          )"
